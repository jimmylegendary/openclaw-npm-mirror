name: mirror-openclaw-npm

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *" # hourly

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve latest npm version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VER=$(npm view openclaw version)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Latest npm version: $VER"

      - name: Mirror package contents
        id: mirror
        shell: bash
        run: |
          set -euo pipefail
          VER='${{ steps.meta.outputs.version }}'
          WORK=$(mktemp -d)
          pushd "$WORK" >/dev/null
          npm pack "openclaw@$VER" --silent
          TGZ="openclaw-$VER.tgz"
          tar -xzf "$TGZ"
          popd >/dev/null

          # clean tracked files except git metadata/workflows
          find . -mindepth 1 -maxdepth 1 \
            ! -name .git \
            ! -name .github \
            -exec rm -rf {} +

          cp -a "$WORK/package/." .
          cp "$WORK/openclaw-${VER}.tgz" "openclaw-${VER}.tgz"

          # ensure helper doc exists/updated
          cat > MIRROR-INSTALL.md <<EOF
# OpenClaw npm Mirror (GitHub)

This repository mirrors npm package contents for \`openclaw@${VER}\`.

## Install latest mirrored version (this release)

\`\`\`bash
npm install https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VER}/openclaw-${VER}.tgz
pnpm add https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VER}/openclaw-${VER}.tgz
\`\`\`

## Install moving latest ref

\`\`\`bash
npm install github:${GITHUB_REPOSITORY}#latest
pnpm add github:${GITHUB_REPOSITORY}#latest
\`\`\`

## Notes
- Tag \`v${VER}\` and \`${VER}\` are version-pinned refs.
- Branch \`latest\` is force-updated to the newest mirrored version.
EOF

          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.mirror.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          VER='${{ steps.meta.outputs.version }}'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "mirror: openclaw@${VER}"
          git push origin HEAD:main

      - name: Ensure tags and latest branch
        shell: bash
        run: |
          set -euo pipefail
          VER='${{ steps.meta.outputs.version }}'
          git fetch --tags
          git checkout main

          if ! git rev-parse -q --verify "refs/tags/v${VER}" >/dev/null; then
            git tag -a "v${VER}" -m "Mirror npm package openclaw@${VER}"
          fi
          if ! git rev-parse -q --verify "refs/tags/${VER}" >/dev/null; then
            git tag "${VER}"
          fi
          git push origin "v${VER}" "${VER}" || true

          # moving latest branch
          git branch -f latest
          git push -f origin latest

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          VER='${{ steps.meta.outputs.version }}'
          FILE="openclaw-${VER}.tgz"

          if gh release view "v${VER}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "v${VER}" "$FILE" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "v${VER}" "$FILE" \
              --repo "$GITHUB_REPOSITORY" \
              --title "openclaw npm mirror ${VER}" \
              --notes "Automated mirror of npm package openclaw@${VER}."
          fi
